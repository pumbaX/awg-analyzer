<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmneziaWG Config Analyzer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080f1e;color:#e2e8f0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:24px 16px;}
.container{max-width:920px;margin:0 auto;}

header{text-align:center;margin-bottom:28px;}
header h1{font-size:1.75rem;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
header p{color:#475569;font-size:.85rem;}
header .subline{color:#64748b;font-size:.75rem;margin-top:2px;}

.drop-zone{background:#0d1526;border:2px dashed #1e3a5f;border-radius:12px;padding:16px;margin-bottom:8px;transition:border-color .2s,background .2s;cursor:pointer;}
.drop-zone.dragover{border-color:#8b5cf6;background:#111827;}
.drop-zone label{display:block;font-size:.75rem;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
textarea{width:100%;background:transparent;border:none;color:#94a3b8;font-family:'Courier New',monospace;font-size:.8rem;padding:0;resize:vertical;min-height:140px;outline:none;}
textarea:focus{color:#e2e8f0;}
textarea::placeholder{color:#1e3a5f;}

.controls{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.btn{flex:1;min-width:120px;padding:11px;border:none;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;}
.btn-clear{background:#1e293b;color:#64748b;}

/* Version badge */
.version-banner{display:none;background:#0d1526;border:1px solid #312e81;border-radius:10px;padding:14px 20px;margin-bottom:16px;align-items:center;gap:14px;flex-wrap:wrap;}
.ver-badge{padding:6px 18px;border-radius:999px;font-weight:800;font-size:1rem;flex-shrink:0;}
.ver-wg{background:#1e293b;color:#94a3b8;border:1px solid #334155;}
.ver-10{background:#1e1b4b;color:#a5b4fc;border:1px solid #4338ca;}
.ver-15{background:#1a2e1a;color:#86efac;border:1px solid #16a34a;}
.ver-20{background:#2e1a4e;color:#d8b4fe;border:1px solid #7c3aed;}
.ver-desc{color:#94a3b8;font-size:.85rem;line-height:1.5;flex:1;min-width:200px;}
.ver-level{display:inline-block;margin-left:8px;padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:700;background:#312e81;color:#c4b5fd;}

/* Summary box — что это за конфиг */
.summary{display:none;background:linear-gradient(135deg,#0d1526 0%,#0f0d1e 100%);border:1px solid #1e1b4b;border-radius:12px;padding:18px 20px;margin-bottom:16px;}
.summary-title{font-size:.75rem;text-transform:uppercase;letter-spacing:.1em;color:#8b5cf6;margin-bottom:10px;font-weight:700;}
.summary-text{color:#cbd5e1;font-size:.88rem;line-height:1.6;}
.summary-text strong{color:#a78bfa;}
.summary-text .pill{display:inline-block;background:#1e1b4b;color:#c4b5fd;padding:1px 8px;border-radius:6px;font-family:monospace;font-size:.78rem;margin:0 2px;}

/* Score area */
.score-section{display:none;background:#0d1526;border:1px solid #1e293b;border-radius:12px;padding:24px;margin-bottom:16px;}
.score-top{display:flex;align-items:center;gap:32px;flex-wrap:wrap;margin-bottom:20px;}
.ring-svg{width:130px;height:130px;flex-shrink:0;}
.ring-track{fill:none;stroke:#1e293b;stroke-width:10;}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dasharray .9s cubic-bezier(.4,0,.2,1),stroke .5s;}
.verdict-area{flex:1;min-width:200px;}
.verdict-badge{display:inline-block;padding:5px 16px;border-radius:999px;font-weight:700;font-size:1rem;margin-bottom:8px;}
.verdict-text{color:#94a3b8;font-size:.85rem;line-height:1.5;margin-bottom:12px;}

/* Mini scores */
.mini-scores{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
.mini-card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:10px 12px;}
.mini-label{font-size:.67rem;text-transform:uppercase;letter-spacing:.07em;color:#475569;margin-bottom:4px;}
.mini-val{font-size:1.1rem;font-weight:700;}

/* Auto-fix */
.autofix{background:#080f08;border:1px solid #14532d;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:none;}
.autofix-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:#4ade80;margin-bottom:10px;font-weight:700;}
.fix-item{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;font-size:.82rem;color:#86efac;line-height:1.5;}
.fix-item::before{content:'→';color:#4ade80;flex-shrink:0;font-weight:700;}
.fix-item .fix-code{background:#060e1e;color:#22d3ee;font-family:monospace;font-size:.76rem;padding:1px 6px;border-radius:3px;}
.fix-severity{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-right:6px;}
.fix-severity.crit{background:#450a0a;color:#fca5a5;}
.fix-severity.high{background:#451a03;color:#fcd34d;}
.fix-severity.med{background:#1e1b4b;color:#a5b4fc;}
.fix-severity.low{background:#111827;color:#64748b;}

/* Upgrade path — как усилить */
.upgrade{display:none;background:#0a0f1e;border:1px solid #1e3a5f;border-radius:10px;padding:14px 16px;margin-bottom:16px;}
.upgrade-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;color:#22d3ee;margin-bottom:10px;font-weight:700;}
.upgrade-step{color:#94a3b8;font-size:.82rem;line-height:1.55;padding:8px 0;border-bottom:1px dashed #1a2740;}
.upgrade-step:last-child{border-bottom:none;}
.upgrade-step strong{color:#22d3ee;}
.upgrade-step .cmd{display:block;background:#060e1e;color:#86efac;font-family:monospace;font-size:.75rem;padding:6px 10px;border-radius:5px;margin-top:6px;overflow-x:auto;white-space:pre;}

/* Checks */
.checks-grid{display:grid;gap:8px;}
.check-item{background:#0d1526;border:1px solid #1a2740;border-radius:9px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.check-item.pass{border-left:3px solid #22c55e;}
.check-item.warn{border-left:3px solid #f59e0b;}
.check-item.fail{border-left:3px solid #ef4444;}
.check-item.info{border-left:3px solid #8b5cf6;}
.check-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;margin-top:1px;}
.pass .check-icon{background:#14532d;color:#4ade80;}
.warn .check-icon{background:#451a03;color:#fbbf24;}
.fail .check-icon{background:#450a0a;color:#f87171;}
.info .check-icon{background:#2e1a4e;color:#c4b5fd;}
.check-body{flex:1;min-width:0;}
.check-title{font-weight:600;font-size:.88rem;margin-bottom:2px;}
.check-detail{color:#64748b;font-size:.79rem;line-height:1.45;}
.check-value{display:inline-block;background:#060e1e;color:#22d3ee;font-family:monospace;font-size:.76rem;padding:1px 7px;border-radius:3px;margin-top:3px;word-break:break-all;max-width:100%;}
.check-weight{font-size:.7rem;color:#334155;align-self:center;flex-shrink:0;min-width:36px;text-align:right;}

.section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:#1a2740;}

.parsed-params{background:#060e1e;border:1px solid #1a2740;border-radius:8px;padding:12px;font-family:monospace;font-size:.77rem;color:#4b5563;margin-bottom:16px;display:none;white-space:pre;overflow-x:auto;}
.parsed-params span{color:#a78bfa;}

.error-msg{background:#1a0808;border:1px solid #7f1d1d;border-radius:8px;padding:12px;color:#f87171;font-size:.85rem;display:none;margin-bottom:14px;}
.hint{color:#1e293b;font-size:.75rem;margin-top:6px;text-align:center;}

@media(max-width:520px){.score-top{flex-direction:column;align-items:flex-start;}.ring-svg{width:110px;height:110px;}}

/* ===== Light Theme ===== */
body.light{background:#f3f6fb;color:#0f172a;}
body.light .drop-zone,
body.light .check-item,
body.light .score-section,
body.light .version-banner,
body.light .summary,
body.light .upgrade{background:#ffffff;border-color:#d1d9e6;}
body.light .summary{background:linear-gradient(135deg,#fff 0%,#f8f4ff 100%);}
body.light textarea{color:#0f172a;}
body.light textarea::placeholder{color:#94a3b8;}
body.light .mini-card{background:#ffffff;border-color:#d1d9e6;}
body.light .check-detail{color:#475569;}
body.light .parsed-params{background:#ffffff;border-color:#d1d9e6;color:#475569;}
body.light .btn-clear{background:#e2e8f0;color:#0f172a;}
body.light .section-title::after{background:#cbd5e1;}
body.light #ringScore,body.light .ring-svg text{fill:#0f172a !important;}
body.light #ringSub{fill:#475569 !important;}
body.light .summary-text{color:#334155;}
body.light .upgrade-step{color:#475569;border-color:#e2e8f0;}
body.light .check-title{color:#0f172a;}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1 id="themeToggle" style="cursor:pointer">🛡 AmneziaWG Analyzer</h1>
    <p>Определение версии · Анализ параметров · DPI защита · Рекомендации</p>
    <div class="subline">Поддержка: WireGuard · AWG 1.0 · AWG 1.5 · AWG 2.0 (full CPS chain)</div>
  </header>

  <div class="drop-zone" id="dropZone">
    <label>AWG / WireGuard .conf конфиг — или перетащите файл</label>
    <textarea id="configInput" placeholder="[Interface]
PrivateKey = <base64>
Address = 10.45.12.2/32
DNS = 1.1.1.1, 1.0.0.1
MTU = 1320
Jc = 8
Jmin = 8
Jmax = 80
S1 = 72
S2 = 40
S3 = 32
S4 = 12
H1 = 158274004-360618542
H2 = 607302821-1024940239
H3 = 1206090192-1471394501
H4 = 1688276110-2056908608
I1 = <b 0x1603030101210100011d0303...><r 999><rc 16><t>

[Peer]
PublicKey = <base64>
PresharedKey = <base64>
AllowedIPs = 0.0.0.0/0, ::/0
Endpoint = 1.2.3.4:47300
PersistentKeepalive = 25"></textarea>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="analyze()">⚡ Анализировать</button>
    <button class="btn btn-clear" onclick="document.getElementById('fileInput').click()">📁 Файл</button>
    <button class="btn btn-clear" onclick="clearAll()">✕ Очистить</button>
  </div>
  <input type="file" id="fileInput" accept=".conf,.txt" style="display:none" onchange="loadFile(event)">
  <div class="hint">Ctrl+Enter · Перетащите .conf файл</div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Version banner -->
  <div class="version-banner" id="versionBanner">
    <div class="ver-badge" id="verBadge">—</div>
    <div class="ver-desc" id="verDesc"></div>
  </div>

  <!-- Summary — что это за конфиг простым языком -->
  <div class="summary" id="summaryBox">
    <div class="summary-title">📋 Что это за конфиг</div>
    <div class="summary-text" id="summaryText"></div>
  </div>

  <!-- Score -->
  <div class="score-section" id="scoreSection">
    <div class="score-top">
      <svg class="ring-svg" viewBox="0 0 120 120">
        <circle class="ring-track" cx="60" cy="60" r="50"/>
        <circle class="ring-fill" id="ringFill" cx="60" cy="60" r="50" stroke-dasharray="0 314" stroke="#8b5cf6"/>
        <text x="60" y="53" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="800" id="ringScore">0</text>
        <text x="60" y="67" text-anchor="middle" fill="#475569" font-size="8" id="ringSub">AWG</text>
      </svg>
      <div class="verdict-area">
        <div class="verdict-badge" id="verdictBadge">—</div>
        <div class="verdict-text" id="verdictText"></div>
      </div>
    </div>
    <div class="mini-scores" id="miniScores"></div>
  </div>

  <!-- Auto-fix — что срочно исправить -->
  <div class="autofix" id="autofixBox">
    <div class="autofix-title">🔧 Что срочно исправить</div>
    <div id="autofixList"></div>
  </div>

  <!-- Upgrade path — как усилить -->
  <div class="upgrade" id="upgradeBox">
    <div class="upgrade-title">🚀 Как усилить защиту</div>
    <div id="upgradeList"></div>
  </div>

  <div class="parsed-params" id="parsedParams"></div>
  <div id="checksOutput"></div>
</div>

<script>
const CIRC = 2*Math.PI*50;

// ═══════════════════════════════════════════════════════════
//  PARSER
// ═══════════════════════════════════════════════════════════
function parseAWG(raw) {
  raw = raw.trim();
  if (!raw) throw new Error('Пустой конфиг');

  const cfg = { iface: {}, peer: {} };
  let section = null;

  raw.split('\n').forEach(line => {
    line = line.trim();
    if (!line || line.startsWith('#')) return;
    const sm = line.match(/^\[(\w+)\]$/);
    if (sm) { section = sm[1].toLowerCase(); return; }
    const em = line.match(/^([^=]+?)\s*=\s*(.*)$/);
    if (!em || !section) return;
    const k = em[1].trim(), v = em[2].trim();
    if (section === 'interface') cfg.iface[k] = v;
    else if (section === 'peer') cfg.peer[k] = v;
  });

  if (!cfg.iface.PrivateKey && !cfg.iface.privatekey && !raw.includes('[Interface]')) {
    throw new Error('Не найдена секция [Interface]. Вставьте .conf файл AmneziaWG / WireGuard.');
  }

  // Normalize keys (case-insensitive)
  const iface = {};
  Object.keys(cfg.iface).forEach(k => { iface[k.toLowerCase()] = cfg.iface[k]; });
  const peer = {};
  Object.keys(cfg.peer).forEach(k => { peer[k.toLowerCase()] = cfg.peer[k]; });

  return { iface, peer };
}

function getInt(obj, key, def = null) {
  const v = obj[key.toLowerCase()];
  if (v === undefined || v === null || v === '') return def;
  const n = parseInt(v, 10);
  return isNaN(n) ? def : n;
}
function getStr(obj, key, def = '') {
  return (obj[key.toLowerCase()] || def).toString().trim();
}
function hasKey(obj, key) {
  return obj[key.toLowerCase()] !== undefined;
}

// Парсинг H1-H4: либо одиночное число, либо диапазон "start-end"
function parseHRange(iface, key) {
  const v = (iface[key.toLowerCase()] || '').toString().trim();
  if (!v) return null;
  const rm = v.match(/^(\d+)-(\d+)$/);
  if (rm) {
    return { start: parseInt(rm[1]), end: parseInt(rm[2]), isRange: true, width: parseInt(rm[2]) - parseInt(rm[1]), raw: v };
  }
  const n = parseInt(v);
  if (isNaN(n)) return null;
  return { start: n, end: n, isRange: false, width: 0, raw: v };
}

// ═══════════════════════════════════════════════════════════
//  I1 DEEP PARSER — разбор CPS тегов
// ═══════════════════════════════════════════════════════════
function parseI1(i1) {
  if (!i1) return null;
  const result = {
    tags: [],           // ['b', 'r', 'rc', 't', ...]
    firstTag: null,
    hexData: '',        // содержимое первого <b 0x...>
    rTagSizes: [],
    rcTagSizes: [],
    totalRBytes: 0,
    hasT: false,
    hasC: false,
    hasRc: false,
    firstByteOk: false, // первый hex-байт валиден для протокола
    startsWith_b: false,
    maxRSize: 0,
    errors: [],
  };

  // Разбираем все теги
  const tagRegex = /<(\w+)(?:\s+([^>]*))?>/g;
  let m;
  while ((m = tagRegex.exec(i1)) !== null) {
    const tag = m[1].toLowerCase();
    const arg = (m[2] || '').trim();
    result.tags.push({ tag, arg });

    if (tag === 'b') {
      const hexMatch = arg.match(/0x([0-9a-fA-F]+)/);
      if (hexMatch) result.hexData = hexMatch[1].toLowerCase();
    } else if (tag === 'r') {
      const n = parseInt(arg);
      if (!isNaN(n)) {
        result.rTagSizes.push(n);
        result.totalRBytes += n;
        if (n > result.maxRSize) result.maxRSize = n;
      }
    } else if (tag === 'rc') {
      result.hasRc = true;
      const n = parseInt(arg);
      if (!isNaN(n)) result.rcTagSizes.push(n);
    } else if (tag === 't') {
      result.hasT = true;
    } else if (tag === 'c') {
      result.hasC = true;
    }
  }

  if (result.tags.length === 0) {
    result.errors.push('не найдено ни одного тега');
    return result;
  }

  result.firstTag = result.tags[0].tag;
  result.startsWith_b = result.firstTag === 'b';

  if (!result.startsWith_b) {
    result.errors.push('первый тег должен быть <b 0x...> — иначе парсер amneziawg-go ломается');
  }

  // Лимит <r N> — должно быть < 1000
  const tooLarge = result.rTagSizes.filter(n => n >= 1000);
  if (tooLarge.length > 0) {
    result.errors.push(`<r ${tooLarge[0]}> ≥ 1000 — парсер может сломаться, используй куски ≤999`);
  }

  // <c> — старый тег, вызывает ErrorCode 1000
  if (result.hasC) {
    result.errors.push('тег <c> устарел — вызывает ErrorCode 1000 на старых клиентах AmneziaVPN');
  }

  // Детект протокола по hex
  result.protocol = detectI1Protocol(result.hexData);

  // Проверка первого байта под протокол
  if (result.hexData.length >= 2) {
    const firstByte = parseInt(result.hexData.substring(0, 2), 16);
    result.firstByte = firstByte;

    if (result.protocol === 'QUIC') {
      // QUIC long header: form=1 fixed=1 => первый байт 0xc0-0xef
      result.firstByteOk = firstByte >= 0xc0 && firstByte <= 0xef;
      if (!result.firstByteOk) {
        result.errors.push(`первый байт 0x${firstByte.toString(16)} — не валидный QUIC long-header (нужно 0xc0-0xef)`);
      }
    } else if (result.protocol === 'TLS' || result.protocol === 'DTLS') {
      result.firstByteOk = firstByte === 0x16;
    } else if (result.protocol === 'SIP') {
      // SIP — ASCII текст, первый байт = буква
      result.firstByteOk = (firstByte >= 0x41 && firstByte <= 0x5a) || (firstByte >= 0x61 && firstByte <= 0x7a);
    } else {
      result.firstByteOk = true;
    }
  }

  return result;
}

function detectI1Protocol(hex) {
  if (!hex) return 'Unknown';
  const h = hex.toLowerCase();

  // TLS 1.0-1.3 record: 16 0301/0302/0303
  if (/^16030[0-3]/.test(h)) return 'TLS';
  // DTLS 1.0: 16 feff, DTLS 1.2: 16 fefd
  if (/^16fefd/.test(h) || /^16feff/.test(h)) return 'DTLS';
  // QUIC long header: первый байт 0xc0-0xef + известная version
  const known_quic = ['00000001', '6b3343cf', 'ff00001d', 'ff00001e'];
  if (h.length >= 10) {
    const fb = parseInt(h.substring(0,2), 16);
    const ver = h.substring(2, 10);
    if (fb >= 0xc0 && fb <= 0xef && (known_quic.includes(ver) || h.startsWith('c0000'))) return 'QUIC';
  }
  // SIP методы в ASCII hex
  const sip_hex = [
    '494e56495445',     // INVITE
    '5245474953544552', // REGISTER
    '4f5054494f4e53',   // OPTIONS
    '4d455353414745',   // MESSAGE
    '5355425343524942', // SUBSCRIB(E)
    '4e4f54494659',     // NOTIFY
    '535542',           // SUB
  ];
  if (sip_hex.some(s => h.startsWith(s))) return 'SIP';
  // DNS: txid(2) + flags(2) 0x0100/0x0120 + qdcount(2) 0x0001
  if (/^[0-9a-f]{4}01[02]0000[12]/.test(h)) return 'DNS';
  // HTTP plaintext (GET/POST/HTTP)
  if (h.startsWith('474554') || h.startsWith('504f5354') || h.startsWith('48545450')) return 'HTTP';
  // STUN binding request
  if (h.startsWith('0001') && h.includes('2112a442')) return 'STUN';
  return 'Custom';
}

// ═══════════════════════════════════════════════════════════
//  VERSION DETECTION
// ═══════════════════════════════════════════════════════════
// Уровни: WireGuard < AWG 1.0 < AWG 1.5 < AWG 2.0
// AWG 2.0 признаки: S3/S4 И H1-H4 диапазоны (ranges)
// AWG 1.5 признаки: I1 + полный Jc/S1/S2/H1-H4
// AWG 1.0 признаки: Jc > 0
function detectVersion(iface) {
  const hasJc = hasKey(iface, 'jc');
  const hasS1 = hasKey(iface, 's1');
  const hasH1 = hasKey(iface, 'h1');
  const hasI1 = hasKey(iface, 'i1');
  const hasS3 = hasKey(iface, 's3');
  const hasS4 = hasKey(iface, 's4');

  const Jc = getInt(iface, 'jc', 0);
  const S1 = getInt(iface, 's1', 0);
  const S2 = getInt(iface, 's2', 0);

  const h1 = parseHRange(iface, 'h1');
  const h2 = parseHRange(iface, 'h2');
  const h3 = parseHRange(iface, 'h3');
  const h4 = parseHRange(iface, 'h4');
  const allH = [h1, h2, h3, h4];
  const headersHaveRanges = allH.some(h => h && h.isRange);
  const hasAllH = allH.every(h => h !== null);
  const noHatAll = allH.every(h => h === null);
  const headersDefault = noHatAll || (hasAllH && !headersHaveRanges &&
    h1.start === 1 && h2.start === 2 && h3.start === 3 && h4.start === 4);

  // I1 разбор
  const i1Parsed = hasI1 ? parseI1(getStr(iface, 'i1')) : null;
  const protocolName = i1Parsed && i1Parsed.protocol !== 'Unknown' ? i1Parsed.protocol : 'Custom';

  // Уровень обфускации (OBF_LEVEL)
  const i2 = getStr(iface, 'i2');
  const i3 = getStr(iface, 'i3');
  const i4 = getStr(iface, 'i4');
  const i5 = getStr(iface, 'i5');
  const iCount = [getStr(iface,'i1'), i2, i3, i4, i5].filter(x => x).length;

  let obfLevel = null;
  if (!hasI1) obfLevel = 'Базовый (без CPS)';
  else if (iCount === 1) obfLevel = '+I1 (одиночная мимикрия)';
  else if (iCount >= 2) obfLevel = `+I1-I${iCount} (полный CPS chain)`;

  // Чистый WireGuard
  const noObfuscation = (!hasJc || Jc === 0) && (!hasS1 || (S1 === 0 && S2 === 0)) && headersDefault && !hasI1;
  if (noObfuscation) {
    return {
      ver: 'WireGuard', cls: 'ver-wg',
      desc: 'Стандартный WireGuard без обфускации. DPI легко обнаружит трафик по сигнатуре handshake.',
      obfLevel: null, protocol: null,
    };
  }

  // AWG 2.0 — S3/S4 + H диапазоны (CPS опционален)
  if ((hasS3 || hasS4) && headersHaveRanges) {
    const desc = hasI1
      ? `AmneziaWG 2.0 — полная обфускация. H1-H4 диапазоны + S3/S4 рандомизируют все типы пакетов + CPS (I1 имитирует ${protocolName}).`
      : `AmneziaWG 2.0 базовый — H1-H4 диапазоны + S3/S4, но без CPS мимикрии (I1 отсутствует).`;
    return { ver: 'AWG 2.0', cls: 'ver-20', desc, obfLevel, protocol: protocolName };
  }

  // AWG 1.5 — есть I1
  if (hasI1) {
    return {
      ver: 'AWG 1.5', cls: 'ver-15',
      desc: `AmneziaWG 1.5 — Jc/S1/S2/H1-H4 + CPS (I1 имитирует ${protocolName}). Для AWG 2.0 нужны S3/S4 и H1-H4 в виде диапазонов.`,
      obfLevel, protocol: protocolName,
    };
  }

  // AWG 1.0 — Jc + S1/S2 + H1-H4
  if (hasJc && Jc > 0) {
    return {
      ver: 'AWG 1.0', cls: 'ver-10',
      desc: 'AmneziaWG 1.0 — junk-пакеты (Jc/Jmin/Jmax) + S1/S2 рандомизируют handshake + кастомные H1-H4 скрывают сигнатуру WireGuard. Нет CPS.',
      obfLevel: 'Базовый', protocol: null,
    };
  }

  return {
    ver: 'AWG 1.0', cls: 'ver-10',
    desc: 'AmneziaWG минимальный — обфускация неполная.',
    obfLevel: 'Минимум', protocol: null,
  };
}

// ═══════════════════════════════════════════════════════════
//  SUMMARY — что это за конфиг простым языком
// ═══════════════════════════════════════════════════════════
function buildSummary(iface, peer, version) {
  const parts = [];

  // Что за версия
  parts.push(`Это конфиг <strong>${version.ver}</strong>.`);

  // Кратко по функциональности
  if (version.ver === 'WireGuard') {
    parts.push('Обычный WireGuard без обфускации — все пакеты видны как WireGuard, DPI может заблокировать.');
  } else if (version.ver === 'AWG 2.0') {
    parts.push(`Уровень обфускации: <span class="pill">${version.obfLevel}</span>.`);
    if (version.protocol && version.protocol !== 'Custom') {
      parts.push(`CPS имитирует <strong>${version.protocol}</strong> — трафик выглядит как реальный ${version.protocol} handshake.`);
    }
  } else if (version.ver === 'AWG 1.5') {
    parts.push(`Обфускация AWG 1.5 с CPS. Имитация: <strong>${version.protocol}</strong>.`);
  } else {
    parts.push('Базовая обфускация без CPS мимикрии.');
  }

  // Какой у нас сервер
  const endpoint = getStr(peer, 'endpoint');
  if (endpoint) {
    const epParts = endpoint.split(':');
    const port = epParts[epParts.length - 1];
    const host = epParts.slice(0, -1).join(':').replace(/^\[|\]$/g, '');
    const isIP = /^\d{1,3}(\.\d{1,3}){3}$/.test(host) || host.includes(':');
    parts.push(`Сервер: <span class="pill">${host}:${port}</span> (${isIP ? 'IP' : 'домен'}).`);
  }

  // Маршрутизация
  const allowed = getStr(peer, 'allowedips');
  const fullTunnel = allowed.includes('0.0.0.0/0');
  const ipv6Tunnel = allowed.includes('::/0');
  if (fullTunnel && ipv6Tunnel) {
    parts.push('Режим: <strong>полный туннель</strong> — весь трафик (IPv4+IPv6) через VPN.');
  } else if (fullTunnel) {
    parts.push('Режим: <strong>IPv4 туннель</strong> — только IPv4 через VPN, <span class="pill">возможна утечка IPv6</span>.');
  } else if (allowed) {
    parts.push(`Режим: <strong>split-tunnel</strong> — только <span class="pill">${allowed}</span> через VPN.`);
  }

  // DNS
  const dns = getStr(iface, 'dns');
  if (dns) {
    parts.push(`DNS: <span class="pill">${dns}</span>.`);
  } else {
    parts.push('<strong>DNS не задан</strong> — риск DNS leak.');
  }

  // MTU
  const mtu = getInt(iface, 'mtu', null);
  if (mtu) {
    parts.push(`MTU: <span class="pill">${mtu}</span>.`);
  }

  return parts.join(' ');
}

// ═══════════════════════════════════════════════════════════
//  CHECKS
// ═══════════════════════════════════════════════════════════
function runChecks(iface, peer, version) {
  const R = [];
  const push = (cat, title, status, value, detail, pts, max) =>
    R.push({ cat, title, status, value: String(value), detail, pts, max });

  const Jc = getInt(iface, 'jc', null);
  const Jmin = getInt(iface, 'jmin', null);
  const Jmax = getInt(iface, 'jmax', null);
  const S1 = getInt(iface, 's1', null);
  const S2 = getInt(iface, 's2', null);
  const S3 = getInt(iface, 's3', null);
  const S4 = getInt(iface, 's4', null);
  const I1 = getStr(iface, 'i1');
  const I2 = getStr(iface, 'i2');
  const I3 = getStr(iface, 'i3');
  const I4 = getStr(iface, 'i4');
  const I5 = getStr(iface, 'i5');

  // ── KEYS ────────────────────────────────────────────────
  const privkey = getStr(iface, 'privatekey');
  const isBase64 = s => /^[A-Za-z0-9+/]{43}=?$/.test(s);
  const pkOk = privkey && isBase64(privkey);
  push('Ключи', 'PrivateKey', pkOk ? 'pass' : 'fail', pkOk ? privkey.slice(0, 12) + '…' : '(отсутствует)',
    pkOk ? 'Корректный base64 Curve25519 ключ' : 'Приватный ключ отсутствует или невалиден', pkOk ? 10 : 0, 10);

  const pubkey = getStr(peer, 'publickey');
  const pubOk = pubkey && isBase64(pubkey);
  push('Ключи', 'PublicKey (Peer)', pubOk ? 'pass' : 'fail', pubOk ? pubkey.slice(0, 12) + '…' : '(отсутствует)',
    pubOk ? 'Публичный ключ сервера присутствует' : 'Публичный ключ сервера отсутствует', pubOk ? 8 : 0, 8);

  const psk = getStr(peer, 'presharedkey');
  const pskOk = psk && isBase64(psk);
  push('Ключи', 'PresharedKey', pskOk ? 'pass' : 'warn', pskOk ? psk.slice(0, 12) + '…' : '(отсутствует)',
    pskOk ? 'PresharedKey задан — дополнительный слой симметричного шифрования (post-quantum устойчивость)' :
      'PresharedKey отсутствует — дополнительная защита от будущих квантовых атак не активна',
    pskOk ? 6 : 2, 6);

  // ── JUNK PACKETS ────────────────────────────────────────
  const hasJc = Jc !== null;
  push('Junk-пакеты', 'Jc (количество)', !hasJc ? 'fail' : Jc === 0 ? 'warn' : Jc >= 4 && Jc <= 12 ? 'pass' : Jc >= 1 && Jc <= 128 ? 'warn' : 'warn',
    hasJc ? String(Jc) : '(не задан)',
    !hasJc ? 'Jc не задан — нет junk-пакетов, handshake детектируется по размеру' :
      Jc === 0 ? 'Jc=0 — junk-пакеты отключены' :
      Jc >= 4 && Jc <= 12 ? `Jc=${Jc} — в recommended диапазоне 4-12 (мануал AmneziaWG) ✓` :
      Jc > 12 && Jc <= 128 ? `Jc=${Jc} — допустимо (1-128), но вне recommended 4-12` :
      Jc > 128 ? `Jc=${Jc} — превышает лимит мануала (max 128)` :
      `Jc=${Jc} — меньше recommended 4-12 (мануал AmneziaWG)`,
    !hasJc ? 0 : Jc === 0 ? 0 : Jc >= 4 && Jc <= 12 ? 8 : Jc >= 1 && Jc <= 128 ? 4 : 0, 8);

  if (hasJc && Jc > 0) {
    const jminOk = Jmin !== null && Jmin >= 1;
    const jmaxOk = Jmax !== null && Jmax > Jmin && Jmax <= 1280;
    const jrangeOk = jminOk && jmaxOk;
    const jrecommended = Jmin !== null && Jmax !== null && Jmin >= 3 && Jmin <= 15 && Jmax >= 50 && Jmax <= 120;

    push('Junk-пакеты', 'Jmin/Jmax (диапазон размеров)', jrangeOk && jrecommended ? 'pass' : jrangeOk ? 'warn' : 'fail',
      Jmin !== null && Jmax !== null ? `${Jmin}–${Jmax}` : '(не задан)',
      Jmin === null || Jmax === null ? 'Jmin/Jmax не заданы — нужны при Jc>0' :
      Jmax > 1280 ? `Jmax=${Jmax} должен быть ≤ 1280 (мануал AmneziaWG)` :
      Jmax <= Jmin ? `Jmax=${Jmax} должен быть > Jmin=${Jmin}` :
      jrecommended ? `Jmin=${Jmin} Jmax=${Jmax} — в recommended диапазоне (Jmin≈8, Jmax≈80) ✓` :
      `Jmin=${Jmin} Jmax=${Jmax} — валидно, но отличается от recommended (Jmin≈8, Jmax≈80)`,
      jrangeOk && jrecommended ? 6 : jrangeOk ? 4 : 0, 6);
  }

  // ── S1/S2 — AWG 1.5+ ─────────────────────────────────────
  // Мануал: S1 ≤ 1132, S2 ≤ 1188, recommended 15-150
  const hasS1 = S1 !== null, hasS2 = S2 !== null;
  const s1Valid = hasS1 && S1 >= 0 && S1 <= 1132;
  const s2Valid = hasS2 && S2 >= 0 && S2 <= 1188;
  const s1Recommended = hasS1 && S1 >= 15 && S1 <= 150;
  const s2Recommended = hasS2 && S2 >= 15 && S2 <= 150;
  const s1s2Conflict = hasS1 && hasS2 && (S1 + 56 === S2);

  push('Handshake Padding (S1/S2)', 'S1 — Init prefix', !hasS1 ? 'info' : S1 === 0 ? 'warn' : s1Recommended ? 'pass' : s1Valid ? 'warn' : 'fail',
    hasS1 ? String(S1) : '(не задан)',
    !hasS1 ? 'S1 не задан — доступен в AWG 1.5 / 2.0' :
    S1 === 0 ? 'S1=0 — рандомный префикс Init-пакета отключён' :
    s1Recommended ? `S1=${S1} — в recommended диапазоне 15-150 ✓` :
    s1Valid ? `S1=${S1} — валидно (≤1132), но вне recommended 15-150` :
    `S1=${S1} — превышает лимит мануала (max 1132)`,
    !hasS1 ? 1 : S1 === 0 ? 0 : s1Recommended ? 6 : s1Valid ? 4 : 0, 6);

  push('Handshake Padding (S1/S2)', 'S2 — Response prefix', !hasS2 ? 'info' : S2 === 0 ? 'warn' : s2Recommended ? 'pass' : s2Valid ? 'warn' : 'fail',
    hasS2 ? String(S2) : '(не задан)',
    !hasS2 ? 'S2 не задан — доступен в AWG 1.5 / 2.0' :
    S2 === 0 ? 'S2=0 — рандомный префикс Response-пакета отключён' :
    s2Recommended ? `S2=${S2} — в recommended диапазоне 15-150 ✓` :
    s2Valid ? `S2=${S2} — валидно (≤1188), но вне recommended 15-150` :
    `S2=${S2} — превышает protocol limit 1188`,
    !hasS2 ? 1 : S2 === 0 ? 0 : s2Recommended ? 6 : s2Valid ? 4 : 0, 6);

  if (s1s2Conflict) {
    push('Handshake Padding (S1/S2)', '⚠️ S1+56 = S2 конфликт', 'fail', `S1=${S1} S2=${S2}`,
      `S1+56=${S1 + 56} совпадает с S2=${S2} — правило мануала: S1+56 ≠ S2. Пакеты становятся предсказуемыми.`, 0, 0);
  }

  // S3/S4 — только AWG 2.0
  if (S3 !== null || S4 !== null) {
    const s3Ok = S3 !== null && S3 >= 0 && S3 <= 64;
    const s4Ok = S4 !== null && S4 >= 0 && S4 <= 32; // AWG 2.0: S4 max 32
    let detail;
    if (S4 !== null && S4 > 32) {
      detail = `S4=${S4} — превышает лимит AWG 2.0 (максимум 32)`;
    } else if (!s3Ok) {
      detail = `S3=${S3} — вне диапазона 0-64`;
    } else {
      detail = 'S3/S4 — расширенные префиксы AWG 2.0 для Cookie и Data пакетов. Максимальная непредсказуемость размеров.';
    }
    push('Handshake Padding (S3/S4)', 'S3/S4 (AWG 2.0 extended)', s3Ok && s4Ok ? 'pass' : 'warn',
      `S3=${S3 ?? '—'} S4=${S4 ?? '—'}`, detail, s3Ok && s4Ok ? 4 : 2, 4);
  } else if (version.ver === 'AWG 2.0') {
    push('Handshake Padding (S3/S4)', 'S3/S4', 'warn', '(не заданы)',
      'S3/S4 отсутствуют в AWG 2.0 конфиге — handshake пакеты не рандомизированы по размеру', 0, 4);
  }

  // ── H1-H4 MAGIC HEADERS ──────────────────────────────────
  const h1 = parseHRange(iface, 'h1');
  const h2 = parseHRange(iface, 'h2');
  const h3 = parseHRange(iface, 'h3');
  const h4 = parseHRange(iface, 'h4');
  const allHraw = [h1, h2, h3, h4];
  const hasAllH = allHraw.every(h => h !== null);
  const hHaveRanges = allHraw.some(h => h && h.isRange);
  const startVals = hasAllH ? allHraw.map(h => h.start) : [];
  const defaultH = hasAllH && !hHaveRanges && startVals[0] === 1 && startVals[1] === 2 && startVals[2] === 3 && startVals[3] === 4;
  const uniqueH = hasAllH && new Set(startVals).size === 4;
  const hDisplayVal = hasAllH ? allHraw.map(h => h.raw).join(' / ') : '(не заданы)';

  // Проверка H диапазонов по sub-квадрантам в recommended range [5..2^31-1]
  // Мануал: H1-H4 recommended 5 ≤ H ≤ 2147483647
  // Sub-Q1: [5 .. 2^29-1]            (5 .. 536,870,911)       H1
  // Sub-Q2: [2^29 .. 2^30-1]         (536,870,912 .. 1,073,741,823)  H2
  // Sub-Q3: [2^30 .. 3*2^29-1]       (1,073,741,824 .. 1,610,612,735) H3
  // Sub-Q4: [3*2^29 .. 2^31-1]       (1,610,612,736 .. 2,147,483,647) H4
  const MANUAL_MAX = 2147483647; // 2^31 - 1
  let quadrantsOk = true;
  let overlap = false;
  let allWithinManual = true;
  if (hasAllH && hHaveRanges) {
    const SQ = 536870912; // 2^29
    const subQuadrantBounds = [
      [5, SQ - 1],                  // Sub-Q1
      [SQ, 2*SQ - 1],               // Sub-Q2
      [2*SQ, 3*SQ - 1],             // Sub-Q3
      [3*SQ, MANUAL_MAX]            // Sub-Q4
    ];
    for (let i = 0; i < 4; i++) {
      const h = allHraw[i];
      const [qMin, qMax] = subQuadrantBounds[i];
      if (h.end > MANUAL_MAX) allWithinManual = false;
      if (h.start < qMin || h.end > qMax) { quadrantsOk = false; }
    }
    // Проверка пересечения между H
    for (let i = 0; i < 3; i++) {
      if (allHraw[i].end >= allHraw[i+1].start) { overlap = true; break; }
    }
  } else if (hasAllH) {
    // Одиночные числа — проверяем только что в пределах мануального лимита
    for (const h of allHraw) {
      if (h.end > MANUAL_MAX) allWithinManual = false;
    }
  }

  let hStatus, hPts, hDetail;
  if (!hasAllH) {
    hStatus = 'warn'; hPts = 0;
    hDetail = 'H1-H4 не заданы или неполные — WireGuard сигнатура handshake не скрыта';
  } else if (defaultH) {
    hStatus = 'fail'; hPts = 0;
    hDetail = 'H1=1 H2=2 H3=3 H4=4 — ДЕФОЛТНЫЕ значения WireGuard! Handshake легко идентифицируется DPI.';
  } else if (!uniqueH) {
    hStatus = 'fail'; hPts = 0;
    hDetail = 'H1-H4 содержат повторяющиеся значения — конфигурация невалидна';
  } else if (!allWithinManual) {
    hStatus = 'warn'; hPts = 6;
    hDetail = 'H1-H4 выходят за recommended лимит мануала (5 ≤ H ≤ 2^31-1). Windows клиент может не принять значения > 2^31-1.';
  } else if (hHaveRanges && overlap) {
    hStatus = 'fail'; hPts = 0;
    hDetail = 'H1-H4 диапазоны пересекаются — сервер и клиент могут рассинхронизироваться!';
  } else if (hHaveRanges && quadrantsOk) {
    hStatus = 'pass'; hPts = 12;
    hDetail = 'H1-H4 в sub-квадрантах recommended диапазона [5..2^31-1] мануала AmneziaWG — максимальная непредсказуемость, Windows клиент примет ✓';
  } else if (hHaveRanges) {
    hStatus = 'pass'; hPts = 10;
    hDetail = 'H1-H4 заданы диапазонами в recommended лимите, уникальны — AWG 2.0 режим ✓';
  } else {
    hStatus = 'pass'; hPts = 10;
    hDetail = 'H1-H4 уникальны — сигнатура handshake скрыта ✓';
  }

  push('Magic Headers (H1-H4)', 'H1-H4', hStatus, hDisplayVal, hDetail, hPts, 12);

  // Ширина диапазонов — адаптирована под sub-квадранты (~2^29 каждый)
  // Узкий теперь <1000 (минимум по мануалу), хороший ≥ 1000
  if (hHaveRanges) {
    const narrowRanges = allHraw.filter(h => h.isRange && h.width < 1000);
    if (narrowRanges.length) {
      push('Magic Headers (H1-H4)', 'Ширина диапазонов H', 'warn',
        narrowRanges.map(h => `${h.raw} (ширина ${h.width})`).join(', '),
        'Узкие диапазоны H (<1000) уменьшают энтропию. Рекомендуется ширина ≥1000.', 0, 0);
    }
  }

  // ── CPS / I1-I5 ──────────────────────────────────────────
  const i1Parsed = I1 ? parseI1(I1) : null;
  const hasI1 = !!I1;

  if (!hasI1) {
    push('CPS Мимикрия (I1-I5)', 'I1 — Protocol Signature', 'info', '(не задан)',
      'I1 отсутствует — CPS мимикрия отключена. Это базовый уровень AWG 2.0. Для максимальной защиты добавьте I1 с TLS/QUIC/DTLS handshake.',
      0, 15);
  } else {
    // Критичные проверки I1
    if (!i1Parsed.startsWith_b) {
      push('CPS Мимикрия (I1-I5)', '🔴 I1 структура', 'fail', `первый тег: <${i1Parsed.firstTag}>`,
        'I1 НЕ начинается с <b 0x...> — парсер amneziawg-go на клиенте ломает handshake. Переделай так чтобы первый тег был <b 0x...>.',
        0, 15);
    } else if (i1Parsed.hasC) {
      push('CPS Мимикрия (I1-I5)', '⚠️ Устаревший тег <c>', 'fail', 'обнаружен',
        'Тег <c> вызывает ErrorCode 1000 на старых клиентах AmneziaVPN. Убери его.',
        5, 15);
    } else if (i1Parsed.maxRSize >= 1000) {
      push('CPS Мимикрия (I1-I5)', '⚠️ Большой <r>', 'warn',
        `max <r ${i1Parsed.maxRSize}>`,
        `Тег <r ${i1Parsed.maxRSize}> ≥ 1000 — на границе лимита парсера. Разбей на куски ≤999.`,
        10, 15);
    } else if (!i1Parsed.firstByteOk && i1Parsed.protocol !== 'Unknown' && i1Parsed.protocol !== 'Custom') {
      push('CPS Мимикрия (I1-I5)', '⚠️ Первый байт I1', 'warn',
        `0x${(i1Parsed.firstByte || 0).toString(16)}`,
        `Первый байт hex не соответствует протоколу ${i1Parsed.protocol}.`,
        10, 15);
    } else {
      push('CPS Мимикрия (I1-I5)', 'I1 — Protocol Signature', 'pass',
        I1.slice(0, 40) + (I1.length > 40 ? '…' : ''),
        `I1 валидный, начинается с <b 0x...>, max <r>=${i1Parsed.maxRSize}. Трафик имитирует реальный протокол.`,
        15, 15);
    }

    // Протокол
    const protoDesc = {
      'TLS': 'TLS 1.x ClientHello — отлично маскируется под HTTPS трафик, совместим с большинством DPI-систем.',
      'DTLS': 'DTLS 1.0/1.2 record — имитация WebRTC/STUN, хорошо для видеозвонков.',
      'QUIC': 'QUIC Initial handshake — идеальный выбор. QUIC популярен (YouTube, Google). DPI трудно отличить от легитимного HTTP/3.',
      'SIP': 'SIP (VoIP) — телефонные сессии. Трудно блокировать из-за легитимного использования.',
      'DNS': 'DNS query — имитация DNS запроса. Проходит через порт 53, почти не блокируется.',
      'HTTP': 'HTTP request — маскировка под plaintext веб-запрос.',
      'STUN': 'STUN binding request — WebRTC ICE.',
      'Custom': 'Кастомный протокол. Убедись что hex реалистичен.',
      'Unknown': 'Протокол не распознан.',
    };
    const protoPts = { 'QUIC': 5, 'TLS': 5, 'DTLS': 4, 'SIP': 4, 'DNS': 4, 'STUN': 3, 'HTTP': 2, 'Custom': 2, 'Unknown': 1 }[i1Parsed.protocol] || 1;
    push('CPS Мимикрия (I1-I5)', 'Протокол имитации', protoPts >= 4 ? 'pass' : 'info',
      i1Parsed.protocol, protoDesc[i1Parsed.protocol] || '(неизвестно)', protoPts, 5);

    // Цепочка I2-I5
    const iList = [I1, I2, I3, I4, I5].filter(x => x);
    if (iList.length > 1) {
      push('CPS Мимикрия (I1-I5)', `Цепочка I1-I${iList.length}`, 'pass', `${iList.length} пакетов`,
        `Задано ${iList.length} сигнатурных пакетов — высокая энтропия сессии (полный CPS chain). Counter-measures DPI затруднены.`,
        3, 3);
    }
  }

  // ── ENDPOINT & ROUTING ───────────────────────────────────
  const endpoint = getStr(peer, 'endpoint');
  if (endpoint) {
    const ep = endpoint.split(':');
    const epPort = parseInt(ep[ep.length - 1]);
    const epHost = ep.slice(0, -1).join(':').replace(/^\[|\]$/g, '');
    const portStdWG = epPort === 51820 || epPort === 51821;

    push('Сервер', 'Endpoint порт', portStdWG ? 'warn' : epPort < 1024 ? 'warn' : 'pass',
      String(epPort),
      portStdWG ? `${epPort} — стандартный WireGuard порт, легко идентифицируется DPI. Смени на любой выше 1024.` :
      epPort === 443 ? '443 (HTTPS) — отлично маскируется под TLS трафик' :
      epPort === 53 ? '53 (DNS) — почти не блокируется' :
      epPort < 1024 ? `${epPort} — системный порт (<1024), могут быть проблемы` :
      `${epPort} — нормально`,
      portStdWG ? 2 : epPort < 1024 ? 2 : 5, 5);

    const isIPv4 = /^\d{1,3}(\.\d{1,3}){3}$/.test(epHost);
    const isIPv6 = epHost.includes(':');
    const isDomain = !isIPv4 && !isIPv6 && epHost.includes('.');
    push('Сервер', 'Endpoint адрес', isIPv4 || isIPv6 ? 'pass' : isDomain ? 'warn' : 'fail',
      epHost || '?',
      isIPv4 ? 'IPv4 адрес — рекомендуется для AWG (домен вызывает deadlock переподключения на Keenetic и некоторых Android-клиентах)' :
      isIPv6 ? 'IPv6 адрес — работает, но помни про deadlock у домена' :
      isDomain ? '⚠️ Домен в Endpoint — может вызвать deadlock переподключения на Keenetic и старых AmneziaVPN. Рекомендуется IP.' :
      'Неверный формат endpoint',
      isIPv4 || isIPv6 ? 4 : isDomain ? 1 : 0, 4);
  }

  // AllowedIPs — DNS leak
  const allowedIPs = getStr(peer, 'allowedips');
  const fullTunnel = allowedIPs.includes('0.0.0.0/0');
  const hasIPv6Tunnel = allowedIPs.includes('::/0');
  const splitTunnel = allowedIPs && !fullTunnel;

  push('Маршрутизация', 'AllowedIPs', fullTunnel && hasIPv6Tunnel ? 'pass' : fullTunnel ? 'warn' : splitTunnel ? 'info' : 'fail',
    allowedIPs || '(не задан)',
    fullTunnel && hasIPv6Tunnel ? '0.0.0.0/0 + ::/0 — весь трафик (IPv4+IPv6) через VPN, минимальный DNS leak' :
    fullTunnel ? '0.0.0.0/0 без ::/0 — IPv4 через VPN, IPv6 может утечь (DNS/WebRTC leak)' :
    splitTunnel ? 'Split-tunneling — часть трафика мимо VPN' :
    'AllowedIPs не задан',
    fullTunnel && hasIPv6Tunnel ? 6 : fullTunnel ? 3 : splitTunnel ? 2 : 0, 6);

  // DNS
  const dns = getStr(iface, 'dns');
  const dnsOk = !!dns;
  const dnsPrivate = /10\.|192\.168\.|172\.(1[6-9]|2\d|3[01])\./.test(dns);
  const dnsPublicGood = ['1.1.1.1', '8.8.8.8', '9.9.9.9', '208.67.222.222', '94.140.14.14', '77.88.8.8'].some(d => dns.includes(d));
  push('Маршрутизация', 'DNS', dnsOk ? (dnsPrivate || dnsPublicGood ? 'pass' : 'warn') : 'fail',
    dns || '(не задан)',
    !dnsOk ? 'DNS не задан — запросы идут мимо VPN, полный DNS leak' :
    dnsPrivate ? `Приватный DNS (${dns}) — запросы через туннель, нет утечки` :
    dnsPublicGood ? `${dns} — публичный DNS, работает через туннель` :
    `${dns} — нестандартный DNS, проверь что запросы идут через туннель`,
    dnsOk ? (dnsPrivate ? 6 : dnsPublicGood ? 4 : 3) : 0, 6);

  // ── MTU ─────────────────────────────────────────────────
  const mtu = getInt(iface, 'mtu', null);
  if (mtu !== null) {
    const isAwg2 = version.ver === 'AWG 2.0';
    const mtuOk = mtu >= 1280 && mtu <= 1420;
    const mtuOptimal = isAwg2 ? (mtu >= 1280 && mtu <= 1340) : (mtu >= 1320 && mtu <= 1420);
    const mtuConflict = Jmax !== null && Jmax >= mtu;

    let detail;
    if (mtuConflict) detail = `MTU=${mtu} но Jmax=${Jmax} ≥ MTU — junk-пакеты будут фрагментироваться, DPI заметит!`;
    else if (!mtuOk) detail = `MTU=${mtu} — вне рекомендуемого диапазона 1280-1420`;
    else if (isAwg2 && !mtuOptimal) detail = `MTU=${mtu} — работает, но для AWG 2.0+CPS оптимум 1280-1340 (CPS пакеты могут быть большими)`;
    else detail = `MTU=${mtu} — оптимальное значение`;

    push('Сеть', 'MTU', mtuConflict ? 'fail' : mtuOk && (!isAwg2 || mtuOptimal) ? 'pass' : 'warn',
      String(mtu), detail, mtuConflict ? 0 : mtuOk && (!isAwg2 || mtuOptimal) ? 4 : 2, 4);
  } else {
    push('Сеть', 'MTU', 'warn', '(не задан)',
      'MTU не задан — будет использован дефолт 1420, но для AWG 2.0 лучше указать 1320', 1, 4);
  }

  // Keepalive
  const ka = getInt(peer, 'persistentkeepalive', null);
  if (ka !== null) {
    const kaOk = ka >= 15 && ka <= 60;
    push('Сеть', 'PersistentKeepalive', ka === 0 ? 'info' : kaOk ? 'pass' : 'warn',
      String(ka),
      ka === 0 ? 'Отключён — соединение может разорваться за NAT. Рекомендуется 20-35 секунд.' :
      kaOk ? `${ka}s — хорошо, поддерживает NAT-соединение` :
      ka < 15 ? `${ka}s — слишком часто (рекомендуется 15-60)` :
      `${ka}s — редко, NAT может закрыть соединение (рекомендуется 15-60)`,
      ka === 0 ? 3 : kaOk ? 3 : 1, 3);
  }

  return R;
}

// ═══════════════════════════════════════════════════════════
//  SCORING
// ═══════════════════════════════════════════════════════════
function calcScores(checks, iface, version) {
  const tp = checks.reduce((a, c) => a + c.pts, 0);
  const mp = checks.reduce((a, c) => a + c.max, 0);
  const total = Math.round((tp / mp) * 100);

  // DPI risk — чем выше тем хуже
  let dpi = 95;
  if (version.ver === 'AWG 2.0') dpi -= 55;
  else if (version.ver === 'AWG 1.5') dpi -= 40;
  else if (version.ver === 'AWG 1.0') dpi -= 25;

  const Jc = getInt(iface, 'jc', 0);
  if (Jc >= 3) dpi -= 10;

  const h1 = parseHRange(iface, 'h1');
  if (h1 && h1.isRange) dpi -= 8;

  const hasValidI1 = iface.i1 && parseI1(iface.i1).startsWith_b;
  if (hasValidI1) dpi -= 12;

  const iCount = ['i1','i2','i3','i4','i5'].filter(k => iface[k]).length;
  if (iCount >= 3) dpi -= 5;

  dpi = Math.max(3, Math.min(92, dpi));
  const stealth = Math.round(100 - dpi * 0.82);

  return { total, dpi, stealth };
}

// ═══════════════════════════════════════════════════════════
//  FIXES — что срочно исправить (с severity)
// ═══════════════════════════════════════════════════════════
function buildFixes(checks, iface, peer, version) {
  const fixes = [];
  const add = (severity, text) => fixes.push({ severity, text });

  const Jc = getInt(iface, 'jc', null);
  const Jmin = getInt(iface, 'jmin', null);
  const Jmax = getInt(iface, 'jmax', null);
  const S1 = getInt(iface, 's1', null);
  const S2 = getInt(iface, 's2', null);
  const S4 = getInt(iface, 's4', null);
  const mtu = getInt(iface, 'mtu', null);

  // === CRIT (ломает работу) ===
  if (iface.i1) {
    const i1p = parseI1(iface.i1);
    if (!i1p.startsWith_b) {
      add('crit', 'I1 должен начинаться с <code class="fix-code">&lt;b 0x...&gt;</code> — иначе handshake ломается на Android/Keenetic.');
    }
    if (i1p.hasC) {
      add('crit', 'Убери тег <code class="fix-code">&lt;c&gt;</code> из I1 — вызывает ErrorCode 1000.');
    }
    if (i1p.maxRSize >= 1000) {
      add('high', `Тег <code class="fix-code">&lt;r ${i1p.maxRSize}&gt;</code> ≥ 1000 — разбей на куски ≤999.`);
    }
  }

  // H1-H4 default
  const h1 = parseHRange(iface, 'h1');
  const h2 = parseHRange(iface, 'h2');
  const h3 = parseHRange(iface, 'h3');
  const h4 = parseHRange(iface, 'h4');
  if (h1 && h2 && h3 && h4 && !h1.isRange && h1.start === 1 && h2.start === 2 && h3.start === 3 && h4.start === 4) {
    add('crit', 'H1=1 H2=2 H3=3 H4=4 — дефолтные значения WireGuard. DPI сразу видит сигнатуру. Используй случайные числа ≥5.');
  }

  // S1+56=S2
  if (S1 !== null && S2 !== null && S1 + 56 === S2) {
    add('high', `S1+56=${S1+56} совпадает с S2=${S2}. Измени S1 или S2 — правило AWG: S1+56 ≠ S2.`);
  }

  // S4 > 32
  if (S4 !== null && S4 > 32) {
    add('high', `S4=${S4} превышает лимит AWG 2.0 (максимум 32).`);
  }

  // Endpoint=домен
  const endpoint = getStr(peer, 'endpoint');
  if (endpoint) {
    const ep = endpoint.split(':');
    const epHost = ep.slice(0, -1).join(':').replace(/^\[|\]$/g, '');
    const isIP = /^\d{1,3}(\.\d{1,3}){3}$/.test(epHost) || epHost.includes(':');
    if (!isIP && epHost) {
      add('high', 'Endpoint содержит домен — это вызывает deadlock переподключения на Keenetic и старых AmneziaVPN. Замени на IP.');
    }
  }

  // Jmax ≥ MTU
  if (mtu !== null && Jmax !== null && Jmax >= mtu) {
    add('high', `Jmax=${Jmax} ≥ MTU=${mtu}. Junk-пакеты будут фрагментироваться. Сделай Jmax ≤ ${mtu - 50}.`);
  }

  // === MEDIUM (снижает скрытность) ===
  if (!iface.dns) {
    add('med', 'Добавь <code class="fix-code">DNS = 1.1.1.1, 1.0.0.1</code> в [Interface] — иначе DNS leak.');
  }

  const allowed = getStr(peer, 'allowedips');
  if (allowed.includes('0.0.0.0/0') && !allowed.includes('::/0')) {
    add('med', 'Добавь <code class="fix-code">::/0</code> в AllowedIPs чтобы закрыть IPv6 leak.');
  }

  if (Jc !== null && Jc < 3 && Jc > 0) {
    add('med', `Jc=${Jc} — мало. Увеличь до 3-10 для лучшей обфускации.`);
  }
  if (Jc === 0 || Jc === null) {
    add('med', 'Jc = 0 или не задан — junk-пакеты отключены. Рекомендуется Jc = 5.');
  }

  if (Jmin !== null && Jmax !== null && (Jmax - Jmin) < 50) {
    add('med', `Jmin-Jmax диапазон слишком узкий (${Jmin}-${Jmax}). Расширь до ≥50 байт разницы.`);
  }

  // === LOW (оптимизация) ===
  if (version.ver === 'WireGuard') {
    add('high', 'Это чистый WireGuard без обфускации. Используй AmneziaWG — добавит Jc/S/H/I параметры.');
  }

  if (version.ver === 'AWG 1.0' || version.ver === 'AWG 1.5') {
    add('low', 'Обнови до AWG 2.0: добавь S3/S4 и переделай H1-H4 в диапазоны.');
  }

  const pubEndpoint = getStr(peer, 'endpoint');
  if (pubEndpoint) {
    const ep = pubEndpoint.split(':');
    const epPort = parseInt(ep[ep.length - 1]);
    if (epPort === 51820 || epPort === 51821) {
      add('low', `Порт ${epPort} — стандартный WireGuard. Смени на случайный выше 1024 (например, 47300).`);
    }
  }

  if (mtu === null) {
    add('low', 'Задай <code class="fix-code">MTU = 1320</code> — оптимум для AWG 2.0 + CPS.');
  }

  if (!getStr(peer, 'presharedkey')) {
    add('low', 'Добавь PresharedKey — дополнительный слой симметричного шифрования (post-quantum устойчивость).');
  }

  return fixes;
}

// ═══════════════════════════════════════════════════════════
//  UPGRADE PATH — как усилить защиту
// ═══════════════════════════════════════════════════════════
function buildUpgradePath(iface, version) {
  const steps = [];
  const hasI1 = !!getStr(iface, 'i1');
  const S3 = getInt(iface, 's3', null);
  const S4 = getInt(iface, 's4', null);
  const h1 = parseHRange(iface, 'h1');

  if (version.ver === 'WireGuard') {
    steps.push({
      title: 'Шаг 1: Перейди на AmneziaWG',
      text: 'Установи amneziawg-tools и пересоздай сервер с Jc/Jmin/Jmax/S1/S2/H1-H4 параметрами. Это добавит базовую обфускацию.',
      cmd: '# На сервере:\nsudo add-apt-repository ppa:amnezia/ppa\nsudo apt install amneziawg amneziawg-tools',
    });
  }

  if (version.ver === 'AWG 1.0' || version.ver === 'AWG 1.5') {
    steps.push({
      title: 'Шаг 1: Обнови до AWG 2.0',
      text: 'AWG 2.0 добавляет S3/S4 (дополнительная рандомизация) и H1-H4 как диапазоны (случайное значение каждый handshake). Пропиши в [Interface]:',
      cmd: 'S3 = 32\nS4 = 8\nH1 = 100000000-100100000\nH2 = 1200000000-1200100000\nH3 = 2300000000-2300100000\nH4 = 3400000000-3400100000',
    });
  }

  if (version.ver.includes('AWG') && !hasI1) {
    steps.push({
      title: `Шаг ${steps.length + 1}: Добавь CPS мимикрию (I1)`,
      text: 'I1 — сигнатурный пакет который имитирует реальный протокол (TLS/QUIC/DTLS/SIP). Без него DPI видит "странный UDP". Сгенерируй через awg2-toolza:',
      cmd: 'sudo awg2\n# Пункт 2 → создать сервер → Уровень 2 (+I1) → TLS профиль',
    });
  }

  if (version.ver === 'AWG 2.0' && hasI1) {
    const iCount = ['i2', 'i3', 'i4', 'i5'].filter(k => iface[k]).length;
    if (iCount === 0) {
      steps.push({
        title: `Шаг ${steps.length + 1}: Добавь полный CPS chain (I2-I5)`,
        text: 'I2-I5 это энтропийные пакеты — размывают паттерн handshake. Вариативность сессий → DPI сложнее построить сигнатуру. Только на современных клиентах (AmneziaVPN 4.8.12+).',
        cmd: 'sudo awg2\n# Пункт 2 → Уровень 3 (+I1-I5)',
      });
    }
  }

  // Порт и endpoint
  const endpointPort = (() => {
    const ep = (iface.endpoint || '').split(':');
    return parseInt(ep[ep.length - 1]);
  })();

  if (endpointPort === 51820 || endpointPort === 51821) {
    steps.push({
      title: `Шаг ${steps.length + 1}: Смени порт сервера`,
      text: 'Порт 51820/51821 — стандарт WireGuard. DPI может фильтровать по порту. Используй случайный 30000-65000.',
      cmd: '# При пересоздании сервера укажи:\nПорт: r  # случайный',
    });
  }

  // H1-H4 диапазоны
  if (h1 && !h1.isRange && version.ver.includes('AWG')) {
    steps.push({
      title: `Шаг ${steps.length + 1}: Переделай H1-H4 в диапазоны`,
      text: 'H1-H4 как одиночные числа работают, но каждое соединение использует одно и то же значение. DPI может их запомнить. Диапазоны дают уникальный magic каждый handshake.',
      cmd: '# Мануал AmneziaWG: recommended 5 ≤ H ≤ 2^31-1\n# Sub-квадранты внутри лимита:\nH1 = 100000000-450000000        # Sub-Q1: 5 .. 2^29-1\nH2 = 700000000-1050000000       # Sub-Q2: 2^29 .. 2^30-1\nH3 = 1200000000-1550000000      # Sub-Q3: 2^30 .. 3*2^29-1\nH4 = 1800000000-2100000000      # Sub-Q4: 3*2^29 .. 2^31-1',
    });
  }

  // MTU оптимизация
  const mtu = getInt(iface, 'mtu', null);
  if (mtu !== null && mtu > 1340 && version.ver === 'AWG 2.0' && hasI1) {
    steps.push({
      title: `Шаг ${steps.length + 1}: Снизь MTU под CPS`,
      text: `MTU=${mtu} работает, но CPS пакеты могут быть большими (до 1500 байт). Снизь до 1320 чтобы избежать фрагментации.`,
      cmd: 'MTU = 1320',
    });
  }

  return steps;
}

// ═══════════════════════════════════════════════════════════
//  VERDICT
// ═══════════════════════════════════════════════════════════
function getVerdict(s) {
  if (s >= 88) return { l: '🛡 Максимальная защита', c: '#a855f7', bg: '#2e1a4e22', t: 'AWG 2.0 с полноценным CPS. Трафик неотличим от реального протокола. Высочайшая устойчивость к DPI.' };
  if (s >= 70) return { l: '✅ Хорошая защита', c: '#4ade80', bg: '#14532d11', t: 'Надёжная конфигурация AWG. Есть параметры для улучшения — проверьте рекомендации ниже.' };
  if (s >= 50) return { l: '⚠️ Средняя защита', c: '#f59e0b', bg: '#78350f11', t: 'Базовая обфускация. Продвинутые DPI могут идентифицировать как AWG/WireGuard.' };
  if (s >= 30) return { l: '🔶 Слабая защита', c: '#f97316', bg: '#431a0311', t: 'Минимальная обфускация. Трафик легко идентифицируется.' };
  return { l: '🔴 Стандартный WireGuard', c: '#ef4444', bg: '#450a0a22', t: 'Нет обфускации. DPI немедленно блокирует трафик.' };
}

function dpiLabel(d) {
  if (d <= 20) return { t: 'LOW', c: '#22c55e' };
  if (d <= 45) return { t: 'MEDIUM', c: '#f59e0b' };
  return { t: 'HIGH', c: '#ef4444' };
}

function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
const icons = { pass: '✓', warn: '!', fail: '✗', info: 'i' };

function renderMini(label, val, color, suffix = '') {
  return `<div class="mini-card"><div class="mini-label">${label}</div><div class="mini-val" style="color:${color}">${esc(String(val))}${suffix}</div></div>`;
}

// ═══════════════════════════════════════════════════════════
//  MAIN
// ═══════════════════════════════════════════════════════════
function analyze() {
  const raw = document.getElementById('configInput').value.trim();
  const errEl = document.getElementById('errorMsg');
  const scoreEl = document.getElementById('scoreSection');
  const parsedEl = document.getElementById('parsedParams');
  const checksEl = document.getElementById('checksOutput');
  const autofixEl = document.getElementById('autofixBox');
  const fixList = document.getElementById('autofixList');
  const miniEl = document.getElementById('miniScores');
  const verBanner = document.getElementById('versionBanner');
  const verBadge = document.getElementById('verBadge');
  const verDesc = document.getElementById('verDesc');
  const summaryEl = document.getElementById('summaryBox');
  const summaryText = document.getElementById('summaryText');
  const upgradeEl = document.getElementById('upgradeBox');
  const upgradeList = document.getElementById('upgradeList');

  // Reset
  errEl.style.display = 'none';
  scoreEl.style.display = 'none';
  parsedEl.style.display = 'none';
  checksEl.innerHTML = '';
  autofixEl.style.display = 'none';
  fixList.innerHTML = '';
  miniEl.innerHTML = '';
  verBanner.style.display = 'none';
  summaryEl.style.display = 'none';
  upgradeEl.style.display = 'none';
  upgradeList.innerHTML = '';

  if (!raw) {
    errEl.textContent = 'Вставьте содержимое .conf файла AmneziaWG / WireGuard';
    errEl.style.display = 'block';
    return;
  }

  let parsed;
  try { parsed = parseAWG(raw); }
  catch (e) { errEl.textContent = e.message; errEl.style.display = 'block'; return; }

  const { iface, peer } = parsed;
  const version = detectVersion(iface);
  const checks = runChecks(iface, peer, version);
  const scores = calcScores(checks, iface, version);
  const fixes = buildFixes(checks, iface, peer, version);
  const upgrades = buildUpgradePath(iface, version);

  // Camouflage
  let camouflage = 'LOW';
  if (version.protocol === 'QUIC' || version.protocol === 'TLS') camouflage = 'HIGH';
  else if (version.protocol === 'DTLS' || version.protocol === 'SIP' || version.protocol === 'DNS') camouflage = 'MEDIUM';

  const verdict = getVerdict(scores.total);
  const dpiL = dpiLabel(scores.dpi);

  // Version banner
  verBanner.style.display = 'flex';
  verBadge.textContent = version.ver;
  verBadge.className = 'ver-badge ' + version.cls;
  let descHtml = esc(version.desc);
  if (version.obfLevel) {
    descHtml += ` <span class="ver-level">${esc(version.obfLevel)}</span>`;
  }
  verDesc.innerHTML = descHtml;

  // Summary
  summaryEl.style.display = 'block';
  summaryText.innerHTML = buildSummary(iface, peer, version);

  // Score ring
  scoreEl.style.display = 'block';
  const rf = document.getElementById('ringFill');
  document.getElementById('ringScore').textContent = scores.total;
  document.getElementById('ringSub').textContent = version.ver;
  rf.setAttribute('stroke-dasharray', `${(scores.total / 100) * CIRC} ${CIRC}`);
  rf.setAttribute('stroke', verdict.c);
  const b = document.getElementById('verdictBadge');
  b.textContent = verdict.l;
  b.style.cssText = `background:${verdict.bg};color:${verdict.c};border:1px solid ${verdict.c}44`;
  document.getElementById('verdictText').textContent = verdict.t;

  // Mini
  miniEl.innerHTML =
    renderMini('AWG Version', version.ver, '#a78bfa') +
    renderMini('DPI Risk', dpiL.t, dpiL.c) +
    renderMini('Stealth', scores.stealth, '#818cf8', '%') +
    renderMini('Security', scores.total, '#e2e8f0', '%') +
    renderMini('Camouflage', camouflage, '#60a5fa');

  // Fixes — сортируем по severity
  if (fixes.length) {
    autofixEl.style.display = 'block';
    const sevOrder = { crit: 0, high: 1, med: 2, low: 3 };
    fixes.sort((a, b) => sevOrder[a.severity] - sevOrder[b.severity]);
    const sevLabel = { crit: 'CRIT', high: 'HIGH', med: 'MED', low: 'LOW' };
    fixList.innerHTML = fixes.map(f =>
      `<div class="fix-item"><div><span class="fix-severity ${f.severity}">${sevLabel[f.severity]}</span>${f.text}</div></div>`
    ).join('');
  }

  // Upgrade path
  if (upgrades.length) {
    upgradeEl.style.display = 'block';
    upgradeList.innerHTML = upgrades.map(u =>
      `<div class="upgrade-step"><strong>${esc(u.title)}</strong><br>${esc(u.text)}${u.cmd ? `<div class="cmd">${esc(u.cmd)}</div>` : ''}</div>`
    ).join('');
  }

  // Parsed params
  parsedEl.style.display = 'block';
  const prows = [
    ['privatekey', iface.privatekey ? iface.privatekey.slice(0, 16) + '…' : '—'],
    ['address', iface.address || '—'],
    ['dns', iface.dns || '—'],
    ['mtu', iface.mtu || '—'],
    ['jc/jmin/jmax', [iface.jc, iface.jmin, iface.jmax].map(v => v ?? '—').join(' / ')],
    ['s1/s2', [iface.s1, iface.s2].map(v => v ?? '—').join(' / ')],
    ['s3/s4', iface.s3 || iface.s4 ? [iface.s3, iface.s4].map(v => v ?? '—').join(' / ') : '—'],
    ['h1/h2/h3/h4', [iface.h1, iface.h2, iface.h3, iface.h4].map(v => v ?? '—').join(' / ')],
    ['i1', iface.i1 ? iface.i1.slice(0, 40) + (iface.i1.length > 40 ? '…' : '') : '—'],
    ['i2-i5', ['i2','i3','i4','i5'].filter(k => iface[k]).length + ' шт' || '—'],
    ['endpoint', peer.endpoint || '—'],
    ['publickey', peer.publickey ? peer.publickey.slice(0, 16) + '…' : '—'],
    ['allowedips', peer.allowedips || '—'],
    ['keepalive', peer.persistentkeepalive || '—'],
  ].filter(([, v]) => v && v !== '—');
  parsedEl.innerHTML = prows.map(([k, v]) => `<span>${k.padEnd(14)}</span>= ${esc(v)}`).join('\n');

  // Checks
  const cats = [...new Set(checks.map(c => c.cat))];
  cats.forEach(cat => {
    checksEl.innerHTML += `<div class="section-title">${cat}</div><div class="checks-grid">`;
    checks.filter(c => c.cat === cat && c.max >= 0).forEach(c => {
      checksEl.innerHTML += `
        <div class="check-item ${c.status}">
          <div class="check-icon">${icons[c.status] || 'i'}</div>
          <div class="check-body">
            <div class="check-title">${c.title}</div>
            <div class="check-value">${esc(c.value)}</div>
            <div class="check-detail">${c.detail}</div>
          </div>
          <div class="check-weight">${c.pts}/${c.max}</div>
        </div>`;
    });
    checksEl.innerHTML += '</div>';
  });
}

function loadFile(e) {
  const file = e.target.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('configInput').value = ev.target.result.trim(); analyze(); };
  r.readAsText(file);
  e.target.value = '';
}
function clearAll() {
  document.getElementById('configInput').value = '';
  ['errorMsg', 'scoreSection', 'parsedParams', 'autofixBox', 'versionBanner', 'summaryBox', 'upgradeBox'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('checksOutput').innerHTML = '';
}

// Drag & drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('dragover');
  const file = e.dataTransfer.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = ev => { document.getElementById('configInput').value = ev.target.result.trim(); analyze(); };
  r.readAsText(file);
});

document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') analyze(); });

// Theme toggle
const themeBtn = document.getElementById('themeToggle');
themeBtn.addEventListener('click', () => { document.body.classList.toggle('light'); });
</script>
</body>
</html>
